pipeline:
  batch_size: 10
codex:
  bin: codex
  # Leave empty to use the account's default model. ChatGPT-auth accounts
  # reject `-m <name>` for unsupported models (e.g. `gpt-5-codex`); set this
  # only when running with an API-key auth that supports model selection.
  model: ""
  timeout: 600
  retries: 3
  retry_backoff: 4.0
collect:
  target_per_role: 3
  parallelism: 10
  eligibility:
    location:
    - Worldwide
    posted_within_days: 1
    exclude_keywords:
    - contract
    - contractor
    - temporary
    - temp
    - freelance
    - part-time
    - part time
    - graduate
    - new grad
    - fresh grad
    - internship
    - intern
  platforms:
    linkedin:
      base_url: https://www.linkedin.com/jobs/search
      location_param: location
      location_value: Worldwide
      time_filter:
        param: f_TPR
        past_24h: r86400
      keyword_param: keywords
      pagination_param: start
      pagination_step: 25
    indeed:
      base_url: https://www.indeed.com/jobs
      location_param: l
      location_value: ''
      time_filter:
        param: fromage
        past_24h: '1'
      keyword_param: q
      pagination_param: start
      pagination_step: 10
  roles:
    mobile:
      search_terms:
      - Mobile Engineer
      - Mobile Developer
      - Mobile App Developer
      - Mobile Application Developer
      - iOS Developer
      - iOS Engineer
      - iOS Software Engineer
      - Android Developer
      - Android Engineer
      - Android Software Engineer
      - Flutter Developer
      - React Native Developer
      - Kotlin Android Developer
      - Swift iOS Developer
      relevance_keywords:
      - mobile
